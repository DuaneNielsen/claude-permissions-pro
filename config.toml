# Deny patterns (safety defaults)

[[deny]]
# Block rm -rf on root, home dir, or top-level dirs like /usr, /etc, /var
# But allow rm -rf on subdirs like /tmp/build, /home/duane/project/dist
pattern = "/^rm\\s+(-[a-zA-Z]*r[a-zA-Z]*\\s+)+(\\/\\s*$|~\\/?($|\\s)|\\/(usr|etc|var|bin|sbin|lib|opt|boot|srv|sys|proc|dev|run|mnt|media)(\\s|\\/\\s*$|$))/"

[[deny]]
pattern = "chmod 777 *"

# Judge configuration (LLM-based evaluation for unmatched commands)
[judge]
enabled = true
model = "gpt-4o-mini"
api_key_env = "OPENAI_API_KEY"
base_url = "https://api.openai.com/v1"
timeout = 5

